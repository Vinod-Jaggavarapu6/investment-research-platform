server {
    listen 3000;

    # Serve React app
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;   # client-side routing fallback
    }

    # Proxy API calls to FastAPI
    # SSE requires these specific headers to work through nginx
    location /research {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        # Required for SSE — disable buffering so tokens flow immediately
        proxy_buffering    off;
        proxy_cache        off;

        # SSE keepalive headers
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;    # long timeout — streams can run 20-30s
    }

    location /news {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }
}