name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

env:
  AWS_REGION: us-east-1

jobs:
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg VITE_API_URL=${{ secrets.ALB_DNS_NAME }} \
            -t $ECR_REGISTRY/investment-research-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/investment-research-frontend:latest \
            ./frontend

          docker push $ECR_REGISTRY/investment-research-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/investment-research-frontend:latest

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster investment-research-cluster \
            --service investment-research-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster investment-research-cluster \
            --services investment-research-frontend \
            --region ${{ env.AWS_REGION }}
