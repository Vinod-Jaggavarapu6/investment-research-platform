global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    # Scrape every 15s; the FastAPI Instrumentator exposes the default registry
    scrape_interval: 15s
